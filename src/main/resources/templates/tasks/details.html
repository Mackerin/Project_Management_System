<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задача - ProjectSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
          rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-kanban"></i> ProjectSystem
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/dashboard">Дашборд</a>
            <a class="nav-link" href="/projects">Проекты</a>
            <a class="nav-link" href="/tasks">Задачи</a>
            <a class="nav-link" href="/logout">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <a href="/tasks" class="btn btn-outline-secondary mb-3">
        <i class="bi bi-arrow-left"></i> Назад к списку
    </a>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 th:text="${task.title}">Заголовок задачи</h4>
            <span class="badge bg-warning">В работе</span>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-8">
                    <h5>Описание</h5>
                    <p th:text="${task.description}">Описание задачи...</p>

                    <h5 class="mt-4">Комментарии</h5>
                    <div class="comments-section">
                        <div th:each="comment : ${task.comments}" class="card mb-2">
                            <div class="card-body">
                                <p class="mb-1" th:text="${comment.content}">Текст комментария</p>
                                <small class="text-muted">
                                    <span th:text="${comment.user.username}">User</span>,
                                    <span th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2025</span>
                                </small>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/tasks/{id}/comment(id=${task.id})}" method="post"
                          class="mt-3">
                        <div class="mb-3">
                                <textarea class="form-control" name="content" rows="3"
                                          placeholder="Добавить комментарий..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-chat"></i> Отправить
                        </button>
                    </form>
                </div>

                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h6>Информация</h6>
                            <p><strong>Статус:</strong>
                                <span th:text="${task.status.displayName}">В работе</span>
                            </p>
                            <p><strong>Приоритет:</strong>
                                <span th:text="${task.priority.displayName}">Средний</span>
                            </p>
                            <p><strong>Исполнитель:</strong>
                                <span th:text="${task.executor?.username}">-</span>
                            </p>
                            <p><strong>Дедлайн:</strong>
                                <span th:text="${task.deadline}">01.01.2025</span>
                            </p>
                            <p><strong>Создано:</strong>
                                <span th:text="${#temporals.format(task.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2025</span>
                            </p>

                            <hr>

                            <h6>Изменить статус</h6>
                            <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post">
                                <select name="status" class="form-select mb-2">
                                    <option value="NEW">Новая</option>
                                    <option value="IN_PROGRESS">В работе</option>
                                    <option value="REVIEW">На проверке</option>
                                    <option value="DONE">Завершена</option>
                                </select>
                                <button type="submit" class="btn btn-success btn-sm w-100">
                                    <i class="bi bi-check-circle"></i> Обновить
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

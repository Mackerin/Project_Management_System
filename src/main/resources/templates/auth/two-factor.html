<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Двухфакторная аутентификация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
<div class="card login-card p-4">
    <div class="card-body">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock" style="font-size: 3rem; color: #667eea;"></i>
            <h3 class="mt-2">Подтверждение входа</h3>
            <p class="text-muted">Введите код из SMS</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i> Неверный код подтверждения
        </div>

        <div class="alert alert-info">
            <i class="bi bi-info-circle"></i>
            <strong>Для учебных целей:</strong> код выведен в консоль сервера
        </div>

        <form th:action="@{/two-factor}" method="post">
            <div class="mb-3">
                <label for="code" class="form-label">Код подтверждения</label>
                <input type="text" class="form-control text-center" id="code" name="code"
                       maxlength="6" pattern="[0-9]{6}" required
                       placeholder="000000" style="font-size: 1.5rem; letter-spacing: 0.5rem;">
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-check-circle"></i> Подтвердить
            </button>
        </form>

        <div class="mt-3 text-center">
            <a th:href="@{/login}" class="text-muted">
                <i class="bi bi-arrow-left"></i> Вернуться ко входу
            </a>
        </div>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
